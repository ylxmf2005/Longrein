<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hunk Walkthrough</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>Hunk Walkthrough</h1>
        <p id="summary" class="summary">Loading diff data</p>
      </div>
      <div class="toolbar" role="group" aria-label="Filter">
        <button id="show-all" class="filter-button active" type="button">全部</button>
        <button id="show-attention" class="filter-button" type="button">待关注</button>
      </div>
    </header>

    <div id="banners" class="banners" aria-live="polite"></div>

    <main class="layout">
      <aside class="sidebar" aria-label="Files">
        <div class="sidebar-heading">
          <span>Files</span>
          <span id="file-count" class="muted">0</span>
        </div>
        <nav id="file-list" class="file-list"></nav>
      </aside>

      <section id="diff-view" class="diff-view" aria-label="Diff"></section>
    </main>
  </div>
</body>
</html>
