<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <style>
    :root {
      --t: #e6edf3;        /* primary text */
      --ts: #9198a1;       /* secondary text */
      --ta: #a5b4fc;       /* accent text (indigo) */
      --tg: #3fb950;       /* green text */
      --tr: #ff7b72;       /* rose text */
      --card: #161b22;     /* card fill */
      --edge: #30363d;     /* card stroke */
      --acard: #1c2140;    /* accent card fill */
      --aedge: #818cf8;    /* accent card stroke */
      --rcard: #2b1a1e;    /* rose card fill */
      --redge: #e5697a;    /* rose card stroke */
      --gcard: #142a1d;    /* green card fill */
      --gedge: #2ea043;    /* green card stroke */
      --gatef: #e3b341;    /* gate diamond fill */
      --gatee: #9e6a03;    /* gate diamond stroke */
    }
    .card  { fill: var(--card);  stroke: var(--edge);  stroke-width: 1.25; }
    .acard { fill: var(--acard); stroke: var(--aedge); stroke-width: 1.25; }
    .rcard { fill: var(--rcard); stroke: var(--redge); stroke-width: 1.25; }
    .gcard { fill: var(--gcard); stroke: var(--gedge); stroke-width: 1.25; }
    .t  { fill: var(--t); }
    .ts { fill: var(--ts); }
    .ta { fill: var(--ta); }
    .tg { fill: var(--tg); }
    .tr { fill: var(--tr); }
    .title { font-size: 13px; font-weight: 700; letter-spacing: 1.5px; }
    .body  { font-size: 11.5px; }
    .small { font-size: 10.5px; }
    .flow  { stroke: var(--ts); stroke-width: 1.5; fill: none; }
    .dash  { stroke: var(--aedge); stroke-width: 1.2; fill: none; stroke-dasharray: 2.5 4; opacity: 0.85; }
    .loop  { stroke: var(--tg); stroke-width: 1.5; fill: none; stroke-dasharray: 6 5; }
    .rflow { stroke: var(--redge); stroke-width: 1.5; fill: none; }
    .gate  { fill: var(--gatef); stroke: var(--gatee); stroke-width: 1.25; }
    .glyph { fill: none; stroke: var(--ts); stroke-width: 1.5; }
    .mFlow { fill: var(--ts); }
    .mLoop { fill: var(--tg); }
    .mRose { fill: var(--redge); }
    .mDash { fill: var(--aedge); }
  </style>
  <defs>
    <marker id="m"  viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path class="mFlow" d="M0 0 L10 5 L0 10 z"/></marker>
    <marker id="mg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path class="mLoop" d="M0 0 L10 5 L0 10 z"/></marker>
    <marker id="mr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path class="mRose" d="M0 0 L10 5 L0 10 z"/></marker>
    <marker id="md" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path class="mDash" d="M0 0 L10 5 L0 10 z"/></marker>
  </defs>

  <!-- ======== top band: sponsor + orchestrator ======== -->
  <rect class="card" x="20" y="22" width="150" height="44" rx="10"/>
  <circle class="glyph" cx="44" cy="36" r="6"/>
  <path class="glyph" d="M34 55 q10 -14 20 0"/>
  <text class="t"  x="64" y="40" font-size="12.5" font-weight="700">You</text>
  <text class="ts small" x="64" y="56">sponsor · final say</text>
  <line class="flow" x1="170" y1="44" x2="196" y2="44" marker-end="url(#m)"/>

  <rect class="acard" x="205" y="22" width="855" height="44" rx="10"/>
  <text class="ta" x="632" y="41" font-size="12.5" font-weight="700" letter-spacing="1.5" text-anchor="middle">DELIVERY ORCHESTRATOR</text>
  <text class="ts small" x="632" y="57" text-anchor="middle">classifies the work · routes every phase to a role · gates on evidence · answers to you</text>

  <!-- routing drops -->
  <line class="dash" x1="240" y1="66" x2="105" y2="122" marker-end="url(#md)"/>
  <line class="dash" x1="282" y1="66" x2="282" y2="122" marker-end="url(#md)"/>
  <line class="dash" x1="475" y1="66" x2="475" y2="122" marker-end="url(#md)"/>
  <line class="dash" x1="682" y1="66" x2="682" y2="122" marker-end="url(#md)"/>
  <line class="dash" x1="857" y1="66" x2="857" y2="122" marker-end="url(#md)"/>
  <line class="dash" x1="1005" y1="66" x2="1005" y2="122" marker-end="url(#md)"/>

  <!-- legend -->
  <text class="small" x="1060" y="460" text-anchor="end"><tspan fill="#e3b341">◆</tspan><tspan class="ts"> human gate&#160;&#160;&#160;&#160;┄ orchestrator routing</tspan></text>

  <!-- ======== pipeline row ======== -->
  <!-- PLAN -->
  <rect class="card" x="20" y="130" width="160" height="104" rx="10"/>
  <text class="ta title" x="100" y="152" text-anchor="middle">PLAN</text>
  <text class="t body"  x="100" y="174" text-anchor="middle">requirements</text>
  <text class="t body"  x="100" y="190" text-anchor="middle">test plan before code</text>
  <text class="t body"  x="100" y="206" text-anchor="middle">design / diagnosis</text>
  <text class="ts small" x="100" y="224" text-anchor="middle">planners · plan reviewers</text>

  <!-- BUILD -->
  <rect class="card" x="215" y="130" width="135" height="104" rx="10"/>
  <text class="ta title" x="282" y="152" text-anchor="middle">BUILD</text>
  <text class="t body"  x="282" y="176" text-anchor="middle">implementation</text>
  <text class="t body"  x="282" y="192" text-anchor="middle">engineer</text>
  <text class="ts small" x="282" y="216" text-anchor="middle">no invented scope</text>

  <!-- REVIEW -->
  <rect class="card" x="385" y="130" width="180" height="104" rx="10"/>
  <text class="ta title" x="475" y="152" text-anchor="middle">REVIEW</text>
  <text class="t body"  x="475" y="174" text-anchor="middle">12 specialist lanes</text>
  <text class="ts small" x="475" y="192" text-anchor="middle">correctness · security · perf</text>
  <text class="ts small" x="475" y="207" text-anchor="middle">reliability · taste · hygiene …</text>
  <text class="ts small" x="475" y="224" text-anchor="middle">no self-approval</text>

  <!-- VERIFY -->
  <rect class="card" x="600" y="130" width="165" height="104" rx="10"/>
  <text class="ta title" x="682" y="152" text-anchor="middle">VERIFY</text>
  <text class="t body"  x="682" y="174" text-anchor="middle">E2E · API · regression</text>
  <text class="ts small" x="682" y="192" text-anchor="middle">real runs — evidence</text>
  <text class="ts small" x="682" y="207" text-anchor="middle">you can open</text>

  <!-- ACCEPT -->
  <rect class="card" x="800" y="130" width="115" height="104" rx="10"/>
  <text class="ta title" x="857" y="152" text-anchor="middle">ACCEPT</text>
  <text class="t body"  x="857" y="176" text-anchor="middle">final gate:</text>
  <text class="ts small" x="857" y="194" text-anchor="middle">evidence vs</text>
  <text class="ts small" x="857" y="209" text-anchor="middle">success criteria</text>

  <!-- DELIVER -->
  <rect class="gcard" x="950" y="130" width="110" height="104" rx="10"/>
  <text class="tg title" x="1005" y="152" text-anchor="middle">DELIVER</text>
  <text class="t body"  x="1005" y="176" text-anchor="middle">report +</text>
  <text class="t body"  x="1005" y="192" text-anchor="middle">audit trail</text>

  <!-- arrows + gates -->
  <line class="flow" x1="180" y1="182" x2="211" y2="182" marker-end="url(#m)"/>
  <line class="flow" x1="350" y1="182" x2="381" y2="182" marker-end="url(#m)"/>
  <line class="flow" x1="565" y1="182" x2="596" y2="182" marker-end="url(#m)"/>
  <line class="flow" x1="765" y1="182" x2="796" y2="182" marker-end="url(#m)"/>
  <line class="flow" x1="915" y1="182" x2="946" y2="182" marker-end="url(#m)"/>
  <path class="gate" d="M197.5 173 L206 182 L197.5 191 L189 182 Z"/>
  <path class="gate" d="M582.5 173 L591 182 L582.5 191 L574 182 Z"/>
  <path class="gate" d="M932.5 173 L941 182 L932.5 191 L924 182 Z"/>

  <!-- circuit breaker under REVIEW -->
  <line class="rflow" x1="475" y1="234" x2="475" y2="252" marker-end="url(#mr)"/>
  <rect class="rcard" x="385" y="256" width="180" height="50" rx="8"/>
  <text class="tr" x="475" y="273" font-size="11" font-weight="700" letter-spacing="1" text-anchor="middle">CIRCUIT BREAKER</text>
  <text class="ts small" x="475" y="288" text-anchor="middle">every finding re-proven —</text>
  <text class="ts small" x="475" y="301" text-anchor="middle">false positives die here</text>

  <!-- compound loop -->
  <path class="loop" d="M1005 240 v78 q0 12 -12 12 H112 q-12 0 -12 -12 v-72" marker-end="url(#mg)"/>
  <text class="tg small" x="560" y="348" text-anchor="middle">compound — this task's lessons become regression tests, rules, and reviewer upgrades: the system gets stronger every delivery</text>

  <!-- ======== paper trail strip ======== -->
  <rect class="card" x="20" y="362" width="1040" height="78" rx="10"/>
  <rect class="glyph" x="46" y="380" width="26" height="34" rx="3"/>
  <line class="glyph" x1="52" y1="390" x2="66" y2="390"/>
  <line class="glyph" x1="52" y1="397" x2="66" y2="397"/>
  <line class="glyph" x1="52" y1="404" x2="60" y2="404"/>
  <rect class="glyph" x="58" y="388" width="26" height="34" rx="3" fill="var(--card)"/>
  <line class="glyph" x1="64" y1="398" x2="78" y2="398"/>
  <line class="glyph" x1="64" y1="405" x2="78" y2="405"/>
  <line class="glyph" x1="64" y1="412" x2="72" y2="412"/>
  <text class="t" x="106" y="388" font-size="12" font-weight="700" letter-spacing="1">EVERY PHASE LEAVES A PAPER TRAIL</text>
  <text class="ts body" x="106" y="407">Work moves through YAML-contracted assignment → receipt files, mechanically validated before any human reads a word.</text>
  <text class="ts body" x="106" y="424">Human gates resolve to approved / skipped / revised / blocked — recorded, never silently passed.</text>
</svg>
